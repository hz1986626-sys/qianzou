// 状态追踪
let currentPersonality = "cold"; // 默认人格

// 1. 切换人格逻辑
document.querySelectorAll('.personality-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelector('.personality-btn.active').classList.remove('active');
        btn.classList.add('active');
        currentPersonality = btn.getAttribute('data-p');
        
        // 增加一点切换时的视觉抖动
        container.classList.add('shake');
        setTimeout(() => container.classList.remove('shake'), 400);
    });
});

// 2. 核心审判逻辑
sendBtn.addEventListener('click', () => {
    const input = inputBox.value.trim();
    if (!input) {
        showReply("连话都不会说？看来你已经没救了。");
        return;
    }

    // 显示“正在审判”的仪式感
    loadingText.style.opacity = 1;
    replyText.style.opacity = 0;

    setTimeout(() => {
        loadingText.style.opacity = 0;
        executeJudgment(input);
    }, 800);
});

function executeJudgment(input) {
    let matchedCategory = "lonely"; // 默认归类
    let finalReply = "";

    // 关键词匹配逻辑
    for (let category in emotionLib) {
        if (emotionLib[category].key.some(k => input.includes(k))) {
            matchedCategory = category;
            break;
        }
    }

    // 从对应人格的文案库中随机抽取一条
    const pool = emotionLib[matchedCategory][currentPersonality];
    const randomSet = pool[Math.floor(Math.random() * pool.length)];
    
    // 将数组形式的文案组合成字符串
    finalReply = Array.isArray(randomSet) ? randomSet.join("<br>") : randomSet;

    // 5% 概率触发“灵异/恶魔”事件
    if (Math.random() < EVIL_EVENT_RATE) {
        finalReply = `<span style="color:white">【系统错误】</span><br>${evilTextList[Math.floor(Math.random() * evilTextList.length)]}`;
        glitchEffect.classList.add('glitch-flash');
        setTimeout(() => glitchEffect.classList.remove('glitch-flash'), 500);
    }

    showReply(finalReply);
}

function showReply(text) {
    replyText.innerHTML = text;
    replyText.style.opacity = 1;
}

function generateReply() {
    const text = inputBox.value.trim();
    if(!text) return;

    loadingText.style.opacity = 1;
    replyText.style.opacity = 0;
    container.classList.add('shake');
    glitchEffect.classList.add('glitch-flash');

    setTimeout(() => {
        // 1. 情绪识别
        let matched = null;
        outer:
        for(const type in emotionLib){
            for(const keyword of emotionLib[type].key){
                if(text.includes(keyword)){
                    matched = type;
                    break outer;
                }
            }
        }

        // 2. 更新历史计数
        if(matched && matched === chatHistory.lastType) {
            chatHistory.count++;
        } else {
            chatHistory.count = 1;
        }

        let finalReply = '';

        // 3. 诡异事件（优先级最高）
        if(Math.random() < EVIL_EVENT_RATE) {
            triggerEvilEffect();
            finalReply = getRandomEvilText();
        }
        // 4. 连续重复情绪 → 50% 概率追问，50% 继续走大库
        else if(matched && chatHistory.count >= 2 && followUpTalk[matched] && Math.random() > 0.5) {
            const list = followUpTalk[matched];
            finalReply = list[Math.floor(Math.random() * list.length)];
        }
        // 5. 正常走大文案库（第一次必走这里）
        else {
            finalReply = getNormalReply(matched);
        }

        // 6. 行为监视覆盖
        let record = updateRecord(matched || "other");
        let monitorTalk = getMonitorTalk(record, matched);
        if(monitorTalk) {
            let lastMonitor = localStorage.getItem("lastMonitorTime") || 0;
            let now = Date.now();
            if(now - lastMonitor > 1800000 && Math.random() < 0.25) {
                finalReply = monitorTalk;
                localStorage.setItem("lastMonitorTime", now);
            }
        }

        // 输出
        chatHistory.lastType = matched;
        chatHistory.lastInput = text;
        replyText.innerText = finalReply;
        loadingText.style.opacity = 0;
        replyText.style.opacity = 1;

        setTimeout(() => {
            container.classList.remove('shake');
            glitchEffect.classList.remove('glitch-flash');
        }, 400);

    }, 600);
}

function getMentalRecord() {
    let record = localStorage.getItem(STORAGE_KEY);
    if (!record) {
        return { todayCount:0, lonelyCount:0, loveCount:0, workCount:0, lastTime:0 };
    }
    return JSON.parse(record);
}

function saveMentalRecord(obj) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
}

function updateRecord(type) {
    let r = getMentalRecord();
    let now = Date.now();
    if (now - r.lastTime > 86400000) {
        r.todayCount = 0; r.lonelyCount = 0; r.loveCount = 0; r.workCount = 0;
    }
    r.todayCount++;
    if (type === "lonely") r.lonelyCount++;
    if (type === "loveLost") r.loveCount++;
    if (type === "work") r.workCount++;
    r.lastTime = now;
    saveMentalRecord(r);
    return r;
}

function getMonitorTalk(record, matchType) {
    if (record.lonelyCount >= 10) return "你今天已经好几次陷入孤独了，别硬撑。";
    if (record.loveCount >= 10) return "反反复复揪着过去不放，你根本没走出来。";
    if (record.todayCount >= 15) return "你今晚情绪很不稳定，一直在自我内耗。";
    return null;
}

function triggerEvilEffect() {
    document.body.style.background = "#b30000";
    container.classList.add("shake");
    glitchEffect.style.opacity = 0.3;
    setTimeout(() => {
        document.body.style.background = "#000";
        container.classList.remove("shake");
        glitchEffect.style.opacity = 0;
    }, 3000);
}

function getRandomEvilText() {
    return evilTextList[Math.floor(Math.random() * evilTextList.length)];
}

function getNormalReply(matched){
    if(!matched) return "你没事吧？别在这里发癫";
    let list = emotionLib?.[matched]?.[currentPersonality];
    if(!list?.length) return "系统情绪解析失败，你的精神状态过于混乱。";
    let pick = list[Math.floor(Math.random() * list.length)];
    return Array.isArray(pick) ? pick.join('\n') : pick;
}

    wrapText(ctx, replyText.innerText, 35, 195, 330, 28);

    ctx.fillStyle = "#666";
    ctx.font = "14px Microsoft Yahei";
    ctx.fillText("审判完成 · 一起发疯", 25, 370);

    let link = document.createElement("a");
    link.download = "赛博精神病院_发疯截图.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    let words = text.split('');
    let line = '';
    let testLine = '';
    let lineArray = [];

    for(let i = 0; i < words.length; i++) {
        testLine += words[i];
        let metrics = ctx.measureText(testLine);
        let testWidth = metrics.width;
        if(testWidth > maxWidth && i > 0) {
            lineArray.push(line);
            testLine = words[i];
            line = words[i];
        } else {
            line = testLine;
        }
    }
    lineArray.push(line);

    for(let j = 0; j < lineArray.length; j++) {
        ctx.fillText(lineArray[j], x, y);
        y += lineHeight;
    }
}
